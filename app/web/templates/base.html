<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "WAD Chat" }}</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; }
      header { padding: 14px 18px; border-bottom: 1px solid rgba(127,127,127,.35); display:flex; gap:12px; align-items:center; justify-content:space-between; }
      main { max-width: 980px; margin: 0 auto; padding: 18px; }
      .card { border: 1px solid rgba(127,127,127,.35); border-radius: 12px; padding: 14px; }
      .row { display:flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      input, textarea, button { font: inherit; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(127,127,127,.35); }
      button { cursor: pointer; }
      a { color: inherit; }
      .muted { opacity: .75; }
      .msg { padding: 10px 12px; border-radius: 10px; margin: 10px 0; background: rgba(127,127,127,.15); }
      .msg.user { border-left: 3px solid #4c8bf5; }
      .msg.assistant { border-left: 3px solid #2ecc71; }
      .bubble-list { display: flex; flex-direction: column; gap: 10px; }
    </style>
  </head>
  <body>
    <header>
      <div><strong>WAD Chat</strong> <span class="muted">MVC + Postgres + Redis</span></div>
      <nav class="row">
        {% if current_user %}
          <a href="/chats">Chats</a>
          <a href="/profile">Profile</a>
          <form method="post" action="/logout" style="margin:0;">
            <button type="submit">Logout</button>
          </form>
        {% else %}
          <a href="/login">Login</a>
          <a href="/register">Register</a>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
